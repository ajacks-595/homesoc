{% extends "base.html" %}
{% block title %}Alert Explorer{% endblock %}
{% block view_toggle %}{% endblock %}
{% block body %}

<div class="flex-row" style="justify-content:space-between; margin-bottom:14px">
  <h1>Alert Explorer <span class="badge accent" id="alert-count-badge">—</span></h1>
  <div class="flex-row">
    <button class="danger" data-act="alertsPreset" data-arg="critical">⚠ Critical ≥ 10</button>
    <button class="warn" data-act="alertsPreset" data-arg="high">High ≥ 7</button>
    <button class="ghost" data-act="alertsPreset" data-arg="all">All</button>
    <select id="f-status" style="margin-left:8px">
      <option value="open" selected>Open only</option>
      <option value="open,in_progress">Open + In Progress</option>
      <option value="">All statuses</option>
      <option value="tp_remediated">TP — Remediated</option>
      <option value="false_positive">False Positive</option>
      <option value="acknowledged">Acknowledged</option>
      <option value="in_progress">In Progress</option>
    </select>
    <button class="secondary" data-act="exportAlerts">⬇ Export CSV</button>
    <button class="secondary" data-act="syncAlerts">↻ Sync from Wazuh</button>
  </div>
</div>

<div class="filter-bar" id="alerts-filter">
  <div class="filter-group"><label>From</label><input type="date" id="f-date-from"></div>
  <div class="filter-group"><label>To</label><input type="date" id="f-date-to"></div>
  <div class="filter-group"><label>Agent</label>
    <input type="text" id="f-agent" placeholder="e.g. cloudron">
  </div>
  <div class="filter-group"><label>Rule ID</label>
    <input type="text" id="f-rule" placeholder="e.g. 87203">
  </div>
  <div class="filter-group"><label>Group</label>
    <input type="text" id="f-group" placeholder="e.g. unifi">
  </div>
  <div class="filter-group" style="min-width:200px">
    <label>Min Level <span id="f-level-out" class="muted">0</span></label>
    <input type="range" id="f-level" min="0" max="15" value="0">
  </div>
  <div class="filter-group" style="flex:1; min-width:240px">
    <label>Search</label>
    <input type="search" id="f-q" placeholder="full text…">
  </div>
  <button data-act="applyAlertFilters">Apply</button>
  <button class="ghost" data-act="clearAlertFilters">Clear</button>
</div>

<div class="card" style="padding:0">
  <table class="data" id="alerts-table">
    <thead>
      <tr>
        <th style="width:30px"><input type="checkbox" id="select-all"></th>
        <th>Timestamp</th>
        <th>Agent</th>
        <th>Rule ID</th>
        <th>Lvl</th>
        <th>Description</th>
        <th>Location</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="pagination">
  <button class="secondary" data-act="alertsPage" data-arg="-1">‹ Prev</button>
  <span class="info" id="alerts-page-info">page 1</span>
  <button class="secondary" data-act="alertsPage" data-arg="1">Next ›</button>
</div>
{% endblock %}

{% block scripts %}
<script nonce="{{ csp_nonce }}">SOC.initAlerts();</script>
{% endblock %}
