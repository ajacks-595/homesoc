# requirements.lock — fully pinned, reproducible dependency set.
#
# This is `pip freeze` of the live prod venv (/opt/dashboard/venv on wazuh-vm),
# captured 2026-06-04. It is the exact, resolved closure that HomeSOC runs in
# production: the core runtime deps + their transitive dependencies + the
# optional MCP server stack (mcp/starlette/uvicorn/pydantic/...) + the test/
# profiling tools (pytest, py-spy).
#
# Use this for a byte-for-byte reproducible install (prevents the dependency
# skew that bit a deploy on 2026-06-04, where the target venv was missing
# nh3/pyotp and a stray upper-bound downgraded cryptography):
#
#     pip install -r requirements.lock
#
# requirements.txt (lower-bounds-only) stays the human-edited source of truth
# for *which* libraries HomeSOC needs. Regenerate this lock after intentional
# upgrades:  ssh wazuh@<host> '/opt/dashboard/venv/bin/pip freeze' > requirements.lock
